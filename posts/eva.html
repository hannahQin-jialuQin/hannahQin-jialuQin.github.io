<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVA观后感 | Hannah Qin</title>

  <style>
    :root {
      --paper: rgba(255,255,255,0.82);
      --text: #1d1b19;
      --muted: #6a635c;
      --line: rgba(29,27,25,0.12);
      --shadow: 0 20px 60px rgba(29, 27, 25, 0.08);
      --max: 760px;
    }

    body {
      margin: 0;
      font-family: "Times New Roman", "Songti SC", "SimSun", serif;
      background: #f6f2eb;
      color: var(--text);
      line-height: 1.95;
    }

    .wrap {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(247, 244, 238, 0.8);
      border-bottom: 1px solid #eee;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
    }

    .nav a {
      color: #666;
      text-decoration: none;
    }

    .article-shell {
      padding: 60px 0;
    }

    .article-card {
      background: var(--paper);
      border-radius: 26px;
      padding: 36px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 2.6rem;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 24px 0;
    }

    article p {
      text-indent: 2em;
      margin-bottom: 1.4em;
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="wrap nav">
    <strong>Hannah Qin</strong>
    <a href="../index.html">首页</a>
  </div>
</header>

<main class="article-shell">
  <div class="wrap">
    <section class="article-card">

      <h1>EVA观后感</h1>

      <div class="divider"></div>

      <article>
        <p>最初看《EVA》时，我以为自己在看一部关于战斗与拯救的作品。</p>
        <p>但随着剧情推进，我逐渐意识到，这更像是一种心理剖析。</p>
        <p>角色之间的关系并不稳定，甚至可以说是不断崩塌的。</p>
        <p>人与人之间的连接始终处在一种随时断裂的状态。</p>
        <p>这种不稳定让我产生了一种熟悉感。</p>
        <p>我逐渐发现，我对这部作品的理解开始偏离剧情分析，而转向自我观察。</p>
        <p>它像一面镜子。</p>
        <p>不是解释，而是映照。</p>
      </article>

    </section>
  </div>
</main>

</body>
</html>
