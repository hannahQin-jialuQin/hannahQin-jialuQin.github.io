<h1>10月5号随笔</h1>
<p class="lead">一些在深夜反复出现的问题。</p>
<div class="divider"></div>

<p>有时候我会怀疑，所谓“成长”是否只是不断修正自我期待的过程。</p>

<p>我们在不同阶段都会设定一个理想状态，但大多数时候，这些状态都无法真正实现。</p>

<p>于是人开始调整：降低预期，或者重新定义目标。</p>

<p>这种调整本身并不一定是坏事。但当它变成一种习惯时，就会逐渐侵蚀原本的判断。</p>

<p>我开始不确定，哪些想法是“真实的”，哪些只是被环境塑造的。</p>

<p>情绪在这种状态下变得不稳定。它既无法完全表达，也无法被彻底压制。</p>

<p>于是只剩下一种模糊的存在感。</p>

<p>写下来或许并不能解决问题，但至少能让这些想法暂时被固定。</p>

<p>哪怕只是短暂的。</p>
